# Publishes the built frontend to GitHub Pages.
# URL shape: https://<user>.github.io/<repo>/
#
# Limitation: GitHub Pages is static only. Set repository secret VITE_API_BASE_URL to your
# real API (e.g. Render/Railway), or upload/edit/download will fail from the Pages site.
name: Deploy frontend to GitHub Pages
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Require VITE_API_BASE_URL secret
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::Without this secret, the app POSTs to github.io/upload and gets HTTP 405."
            echo "Fix: Repo Settings → Secrets and variables → Actions → New repository secret"
            echo "  Name:  VITE_API_BASE_URL"
            echo "  Value: https://your-backend.onrender.com   (no trailing slash)"
            echo "Then re-run this workflow."
            exit 1
          fi
      # Optional secrets for a custom domain (see README):
      #   VITE_SITE_URL = https://yourdomain.com/   (trailing slash)
      #   VITE_BASE_PATH = /                        (root path; default is /repo-name/ for github.io)
      #   VITE_GA_MEASUREMENT_ID = G-XXXXXXXXXX     (must match GA4 Admin → Data streams; overrides frontend/.env.production)
      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GOOGLE_SITE_VERIFICATION: ${{ secrets.VITE_GOOGLE_SITE_VERIFICATION }}
        run: |
          if [ -n "${{ secrets.VITE_GA_MEASUREMENT_ID }}" ]; then
            export VITE_GA_MEASUREMENT_ID="${{ secrets.VITE_GA_MEASUREMENT_ID }}"
          fi
          if [ -n "${{ secrets.VITE_SITE_URL }}" ]; then
            export VITE_SITE_URL="${{ secrets.VITE_SITE_URL }}"
          else
            export VITE_SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi
          if [ -n "${{ secrets.VITE_BASE_PATH }}" ]; then
            export VITE_BASE_PATH="${{ secrets.VITE_BASE_PATH }}"
          else
            export VITE_BASE_PATH="/${{ github.event.repository.name }}/"
          fi
          npm ci && npm run build
      - name: Verify GA4 Measurement ID in bundle
        working-directory: frontend
        run: |
          shopt -s nullglob
          js=(dist/assets/*.js)
          if [ ${#js[@]} -eq 0 ]; then
            echo "::warning::No dist/assets/*.js — unexpected build output."
            exit 0
          fi
          if grep -qE 'G-[A-Z0-9]{6,15}' "${js[@]}" 2>/dev/null; then
            echo "GA4: Measurement ID pattern found in built JS (custom events will use gtag when users interact)."
          else
            echo "::warning::No G-xxxxxxxxxx pattern in dist JS — custom events will not fire. Add Actions secret VITE_GA_MEASUREMENT_ID (GA4 → Admin → Data streams) or set VITE_GA_MEASUREMENT_ID in frontend/.env.production."
          fi
      - name: SPA fallback (GitHub Pages client-side routes)
        working-directory: frontend/dist
        run: cp index.html 404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
