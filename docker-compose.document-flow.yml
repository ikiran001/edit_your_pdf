# Optional Gotenberg stack (only if you still want a standalone LibreOffice HTTP converter — the pdfpilot
# web app Word→PDF tool does not call the API).
# Usage:
#   docker compose -f docker-compose.document-flow.yml up -d
# Example env for local API experiments:
#   export GOTENBERG_URL=http://localhost:3044
# Production Dockerfile installs LibreOffice and sets SOFFICE_PATH=/usr/bin/soffice.
# The same API image also installs ocrmypdf + Tesseract (eng+hin) for POST /ocr-pdf (searchable PDF).
# Local API: install LibreOffice and set:
#   export SOFFICE_PATH=/usr/bin/soffice
# macOS example:
#   export SOFFICE_PATH="/Applications/LibreOffice.app/Contents/MacOS/soffice"

services:
  gotenberg:
    image: gotenberg/gotenberg:8-libreoffice
    ports:
      - '3044:3000'
    # Chromium is unused for DOCX→PDF; slim profile is fine if your Gotenberg version supports it.
    restart: unless-stopped
