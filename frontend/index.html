<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Edit your PDF online for free. Upload a PDF, change text and annotate in your browser, then download. No install, no watermark."
    />
    <meta name="theme-color" content="#0f0614" />
    <meta name="application-name" content="letsEditPDF" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon-32x32.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="%VITE_SITE_URL%" />
    <meta property="og:title" content="letsEditPDF — Edit your PDF free online" />
    <meta
      property="og:description"
      content="Free online PDF editor: edit text and annotate PDFs in your browser, then download. No install."
    />
    <meta property="og:url" content="%VITE_SITE_URL%" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="letsEditPDF" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="letsEditPDF — Edit your PDF free online" />
    <meta
      name="twitter:description"
      content="Free online PDF editor: edit text and annotate PDFs in your browser, then download. No install."
    />
    <!-- Google Search Console: set VITE_GOOGLE_SITE_VERIFICATION at build (see README), or replace the placeholder below with your full `content` value from Google. -->
    <meta name="google-site-verification" content="ef1-peQCO4zwQvjOfXWLxpmoLmoipr1JfnsaNXA9mmo" />
    <title>letsEditPDF — Edit your PDF free online</title>
    <!-- WebSite name is the brand Google may show as the result "site name" (best with a custom domain). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "letsEditPDF",
        "alternateName": "Edit your PDF free online — edit text and annotate in your browser",
        "url": "%VITE_SITE_URL%"
      }
    </script>
  </head>
  <body>
    <script>
      ;(function () {
        try {
          var k = 'letsEditPDF-theme'
          var v = localStorage.getItem(k)
          var light = v === 'light'
          var root = document.documentElement
          var b = document.body
          root.classList.toggle('dark', !light)
          b.classList.remove('theme-dark', 'theme-light')
          b.classList.add(light ? 'theme-light' : 'theme-dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
          document.body.classList.add('theme-dark')
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
