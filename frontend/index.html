<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PDFly — Free PDF tools. Fast, simple, no watermark. Edit, sign, convert, and unlock PDFs in your browser."
    />
    <meta name="theme-color" content="#0f0614" />
    <meta name="application-name" content="PDFly" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon-32x32.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+Devanagari:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="%VITE_SITE_URL%" />
    <meta property="og:title" content="PDFly - Edit, Sign &amp; Convert PDFs" />
    <meta
      property="og:description"
      content="PDFly — Free PDF tools. Fast, simple, no watermark. Edit, sign, convert, and unlock PDFs in your browser."
    />
    <meta property="og:url" content="%VITE_SITE_URL%" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PDFly" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PDFly - Edit, Sign &amp; Convert PDFs" />
    <meta
      name="twitter:description"
      content="PDFly — Free PDF tools. Fast, simple, no watermark. Edit, sign, convert, and unlock PDFs in your browser."
    />
    <!-- Google Search Console HTML tag verification (keep after verification succeeds). -->
    <meta name="google-site-verification" content="X4UwmRKzJYGTXsmFcN2o1ZD3Kg7xLBfmKvUuariTNvs" />
    <title>PDFly - Edit, Sign &amp; Convert PDFs</title>
    <!-- WebSite name is the brand Google may show as the result "site name" (best with a custom domain). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PDFly",
        "alternateName": "Free PDF tools. Fast, simple, no watermark.",
        "url": "%VITE_SITE_URL%"
      }
    </script>
  </head>
  <body>
    <script>
      ;(function () {
        try {
          var k = 'PDFly-theme'
          var v = localStorage.getItem(k)
          if (v == null) {
            var leg =
              localStorage.getItem('TheBestPDF-theme') || localStorage.getItem('letsEditPDF-theme')
            if (leg != null) {
              v = leg
              try {
                localStorage.setItem(k, leg)
              } catch (e2) {}
            }
          }
          var light = v === 'light'
          var root = document.documentElement
          var b = document.body
          root.classList.toggle('dark', !light)
          b.classList.remove('theme-dark', 'theme-light')
          b.classList.add(light ? 'theme-light' : 'theme-dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
          document.body.classList.add('theme-dark')
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
