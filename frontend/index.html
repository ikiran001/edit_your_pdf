<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Edit PDFs in your browser: upload, annotate with pdf.js, then download. Free online PDF editor — no install."
    />
    <link rel="canonical" href="%VITE_SITE_URL%" />
    <!-- Open Graph / Twitter; site URL for canonical/og:url comes from VITE_SITE_URL at build (see .env.production + GitHub Actions). -->
    <meta property="og:title" content="Edit Your PDF | Free Online PDF Editor" />
    <meta
      property="og:description"
      content="Edit PDFs in your browser: upload, annotate, download. Free online PDF editor."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Edit Your PDF" />
    <meta property="og:url" content="%VITE_SITE_URL%" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Edit Your PDF | Free Online PDF Editor" />
    <meta
      name="twitter:description"
      content="Edit PDFs in your browser: upload, annotate, download. Free online PDF editor."
    />
    <!-- Google Search Console: set VITE_GOOGLE_SITE_VERIFICATION at build (see README), or replace the placeholder below with your full `content` value from Google. -->
    <meta name="google-site-verification" content="ef1-peQCO4zwQvjOfXWLxpmoLmoipr1JfnsaNXA9mmo" />
    <title>Edit Your PDF | Free Online PDF Editor</title>
    <!-- Helps Google show your brand as the result "site name" (not the generic GitHub Pages label). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Edit Your PDF",
        "alternateName": "Edit Your PDF — free online PDF editor",
        "url": "%VITE_SITE_URL%"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
