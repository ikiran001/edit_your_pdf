# Render Blueprint — https://render.com/docs/blueprint-spec
# Uses repo-root Dockerfile so the service works when the repo is the Git root
# (avoids empty image when context was wrong).
services:
  - type: web
    name: edit-your-pdf-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
