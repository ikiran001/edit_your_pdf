# Render Blueprint — https://render.com/docs/blueprint-spec
#
# - Word → PDF: handled **in the browser** in the pdfpilot web app (no API upload). No Gotenberg service is defined here.
# - PDF → Word (API): install LibreOffice (`SOFFICE_PATH=/usr/bin/soffice`) for POST /document-flow/convert-pdf-to-docx
#   and session export-docx when you need server-side PDF→DOCX.
# - API web service (`name` below): MUST match your Render service name exactly (same as the
#   `https://<name>.onrender.com` host).
#
# OCR: the API Dockerfile installs ocrmypdf + Tesseract (POST /ocr-pdf). Rebuild the web service after pulling.
#
# My Documents + secured download: set FIREBASE_SERVICE_ACCOUNT_JSON on the API service (Dashboard →
# Environment) to your Firebase service account JSON (one line). Same project must have Firestore enabled.
# Do not commit secrets into this file; use sync: false below or paste only in the Render UI.
services:
  - type: web
    name: edit-your-pdf-chew
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: SOFFICE_PATH
        value: /usr/bin/soffice
      # Paste value in Render Dashboard (secret). Required for My Documents + optional download auth.
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # Razorpay (Pro plans). Webhook: POST https://<this-service>/subscription/webhooks/razorpay
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
